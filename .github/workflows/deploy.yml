name: Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: |
          mkdir -p _site/assets
          cp assets/style.css _site/assets/style.css
          cp CNAME _site/CNAME
          for f in content/*.md; do
            name=$(basename "$f" .md)
            pandoc "$f" \
              --from markdown \
              --to html5 \
              --standalone \
              --template templates/page.html \
              --metadata year=$(date +%Y) \
              -o "_site/${name}.html"
          done
          # Friendly URLs (no .html)
          mkdir -p _site/privacy && mv _site/privacy.html _site/privacy/index.html
          mkdir -p _site/terms   && mv _site/terms.html   _site/terms/index.html
          mkdir -p _site/account-deletion && mv _site/account-deletion.html _site/account-deletion/index.html
          mkdir -p _site/konto-loeschen   && mv _site/konto-loeschen.html   _site/konto-loeschen/index.html
          mkdir -p _site/startseite       && mv _site/startseite.html       _site/startseite/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
