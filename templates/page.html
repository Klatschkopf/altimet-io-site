<!DOCTYPE html>
<html lang="$if(lang)$$lang$$else$en$endif$">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>/* apply saved theme before paint (no flash) */(function(){try{var t=localStorage.getItem("altimet-theme");if(t==="dark"||t==="light")document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
    <title>$title$ · Altimet</title>
    <link rel="stylesheet" href="/assets/style.css">
    <meta name="robots" content="index, follow">
$if(alturl)$
    <link rel="alternate" hreflang="$if(lang)$$lang$$else$en$endif$" href="$url$">
    <link rel="alternate" hreflang="$altlang$" href="$alturl$">
$endif$
</head>
<body>
    <header>
      <div class="wrap">
        <nav>
            <a class="brand" href="/">Altimet</a>
            <span class="links">
                <a href="/privacy">Privacy</a>
                <a href="/terms">Terms</a>
            </span>
            <span class="spacer"></span>
$if(alturl)$            <a class="lang" href="$alturl$">$altlabel$</a>
$endif$            <button class="daynight" id="daynight" type="button" aria-label="Switch between day and night">
                <span class="track">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
                    <span class="knob"></span>
                </span>
            </button>
        </nav>
      </div>
    </header>

    <main class="wrap layout-$if(layout)$$layout$$else$doc$endif$">
$body$
    </main>

    <footer>
      <div class="wrap">
        <div class="foot-card">
            <span class="c">© $year$ Altimet</span>
            <span class="dot">·</span> <a href="/terms#imprint">Imprint (Impressum)</a>
            <span class="dot">·</span> <a href="/privacy">Privacy</a>
            <span class="dot">·</span> <a href="/terms">Terms</a>
            <span class="dot">·</span> <a href="/account-deletion">Delete account</a>
            <span class="dot">·</span> <a href="mailto:support@altimet.io">support@altimet.io</a>
        </div>
      </div>
    </footer>

    <script>
    /* day/night toggle — persists the choice; defaults to the OS preference */
    (function(){
        var root=document.documentElement, btn=document.getElementById("daynight");
        if(!btn) return;
        function current(){
            var set=root.getAttribute("data-theme");
            return set || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        }
        btn.addEventListener("click", function(){
            var next=current()==="dark" ? "light" : "dark";
            root.setAttribute("data-theme", next);
            try{ localStorage.setItem("altimet-theme", next); }catch(e){}
        });
    })();
    </script>
$if(alturl)$    <script>
    /* Cookie-free language auto-detect. Redirects once per tab to the visitor's
       preferred language; never overrides a manual toggle within the same tab. */
    (function () {
        try {
            if (sessionStorage.getItem("ld")) return;
            sessionStorage.setItem("ld", "1");
            var pref = (navigator.language || navigator.userLanguage || "").toLowerCase();
            if (pref.indexOf("$altlang$") === 0) location.replace("$alturl$");
        } catch (e) { /* storage blocked → no auto-detect, toggle still works */ }
    })();
    </script>
$endif$
</body>
</html>
